services:
  - type: web
    name: remote-view-signaling
    env: python
    region: oregon
    buildCommand: "pip install -r signaling_server/requirements.txt"
    startCommand: "uvicorn signaling_server.server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: ALLOWED_ORIGINS
        value: "*"
