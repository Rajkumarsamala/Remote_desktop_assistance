name: Build Desktop Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: RemoteViewHost.exe
            asset_name: RemoteViewHost-Windows.exe
          - os: macos-latest
            artifact_name: RemoteViewHost
            asset_name: RemoteViewHost-Mac
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pynput aiortc av mss pyautogui websockets aiohttp
          if [ "$RUNNER_OS" == "Windows" ]; then
            pip install pyaudiowpatch
          fi
          
      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          pyinstaller --onefile --noconsole host/host.py --name RemoteViewHost-Windows

      - name: Build with PyInstaller (Mac)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          pyinstaller --onefile --noconsole host/host.py --name RemoteViewHost-Mac

      - name: Fail-Safe Check (ls dist/)
        shell: bash
        run: |
          ls -la dist/

      - name: Create or Update Latest Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Release
          files: |
            dist/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
