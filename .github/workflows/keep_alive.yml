name: Keep Backend Awake

on:
  schedule:
    - cron: '*/5 * * * *'  # Runs every 5 minutes
  workflow_dispatch:       # Allows manual triggering from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          echo "Pinging https://remote-view-signaling.onrender.com/health to keep it awake..."
          curl -f https://remote-view-signaling.onrender.com/health || exit 1
