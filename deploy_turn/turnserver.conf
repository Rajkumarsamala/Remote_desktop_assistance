# Coturn configuration for RemoteView

# Use the long-term credential mechanism for authentication
lt-cred-mech

# Realm to use
realm=remoteview.local

# Authenticated user credentials (username:password)
# CHANGE THIS IN PRODUCTION
user=remoteview:remoteview_secret_password

# IPv4 configuration
listening-port=3478
tls-listening-port=443

# UDP port range for media routing
min-port=49152
max-port=65535

# Fingerprint for WebRTC
fingerprint

# DO NOT ALLOW local unauthenticated access
no-stun-backward-compatibility
no-multicast-peers

# Logging
log-file=/var/log/turnserver/turnserver.log
no-stdout-log
simple-log
